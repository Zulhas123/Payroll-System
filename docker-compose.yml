services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: payroll-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - payroll_sql_data:/var/opt/mssql

volumes:
  payroll_sql_data:

